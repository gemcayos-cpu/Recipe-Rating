<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rate Us</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:15px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

.star{
font-size:40px;
color:#ccc;
cursor:pointer;
}

.active{
color:gold;
}

textarea{
width:100%;
height:80px;
margin-top:15px;
border-radius:8px;
border:1px solid #ddd;
padding:10px;
}

button{
margin-top:15px;
padding:12px;
background:black;
color:white;
border:none;
border-radius:8px;
width:100%;
}

</style>
</head>

<body>

<div class="card">

<h2>Rate Your Experience</h2>

<div id="stars">
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
</div>

<textarea id="comment" placeholder="Leave a comment"></textarea>

<button onclick="submitRating()">Submit</button>

</div>

<script>

let rating = 0
let stars = document.querySelectorAll(".star")

stars.forEach((star,index)=>{

star.onclick = function(){

rating = index+1

stars.forEach(s=>s.classList.remove("active"))

for(let i=0;i<rating;i++){
stars[i].classList.add("active")
}

}

})

function submitRating(){

fetch("https://script.google.com/macros/s/AKfycbx7VYgd4y5hwZZiu0c5Lh9pVTUevzDonbSFf3jXn_1JU6i3L81y6G2TaSMKBIJOvhKgWw/exec",{

method:"POST",

body:JSON.stringify({
rating:rating,
comment:document.getElementById("comment").value,
photo:"none"
})

})

alert("Thank you!")

}

</script>

</body>
</html>
